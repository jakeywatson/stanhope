name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build presentation
        working-directory: presentation
        run: |
          npm ci
          npm run build -- --base /stanhope/

      - name: Build sim
        working-directory: sim
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r presentation/dist/. _site/
          mkdir -p _site/sim
          cp -r sim/dist/. _site/sim/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
